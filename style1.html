<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Online Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --bg: #000000; --header: #000000; --search: #121b22; --green: #00a884; --grey: #8696a0; --border: #202c33; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        .form-container { width: 100%; max-width: 320px; background: #000; padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--search); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 30px; background: var(--green); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #main-app { display: none; flex-direction: column; height: 100%; }
        .top-bar { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); align-items: center; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 70px; }
        .user-row { display: flex; padding: 15px; align-items: center; gap: 15px; border-bottom: 0.1px solid var(--border); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .dot.online { background: #00e676; box-shadow: 0 0 5px #00e676; }
        .bottom-nav { background: var(--header); display: flex; padding: 10px 0; border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; }
        .nav-item { flex: 1; text-align: center; color: var(--grey); font-size: 12px; }
        .nav-item.active { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="full-screen">
        <div class="form-container">
            <h1 style="color: var(--green); text-align: center; margin-bottom: 20px;">WhatsApp</h1>
            <input type="text" id="name" placeholder="Full Username">
            <input type="text" id="id" placeholder="Email or Phone">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Sign Up / Login</button>
        </div>
    </div>

    <div id="main-app">
        <div class="top-bar">
            <h2>WhatsApp</h2>
            <div style="display:flex; gap:20px; color:var(--grey);">
                <span class="material-icons">photo_camera</span>
                <span class="material-icons">search</span>
                <span class="material-icons" onclick="location.reload()">logout</span>
            </div>
        </div>
        <div class="content" id="user-list">
            <p style="padding:20px; color:var(--grey);">Connecting...</p>
        </div>
        <div class="bottom-nav">
            <div class="nav-item"><span class="material-icons" style="display:block;">data_usage</span>Online</div>
            <div class="nav-item active"><span class="material-icons" style="display:block;">forum</span>Chats</div>
            <div class="nav-item"><span class="material-icons" style="display:block;">group</span>Group</div>
            <div class="nav-item"><span class="material-icons" style="display:block;">call</span>Call</div>
        </div>
    </div>

    <script>
        // TERA EXACT CONFIG CODE
        const firebaseConfig = {
            apiKey: "AIzaSyAOAjjB1JWkxN1VrLwYQxbKXTR3rnmCVpg",
            authDomain: "my-whatsapp-fc989.firebaseapp.com",
            projectId: "my-whatsapp-fc989",
            storageBucket: "my-whatsapp-fc989.firebasestorage.app",
            messagingSenderId: "518985132078",
            appId: "1:518985132078:web:622c96dbbee5cd885717bf",
            measurementId: "G-43GRQ1J74L"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleAuth() {
            const name = document.getElementById('name').value.trim();
            const rawId = document.getElementById('id').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if(!name || !rawId || !pass) return alert("Details dalo!");

            const id = rawId.replace(/\./g, '_'); // Dots are not allowed in Firebase keys

            db.ref('users/' + id).once('value', (snap) => {
                const userData = snap.val();
                if(userData) {
                    if(userData.pass === pass) login(userData);
                    else alert("Wrong password!");
                } else {
                    const newUser = { name, id, pass, status: 'online' };
                    db.ref('users/' + id).set(newUser).then(() => login(newUser));
                }
            });
        }

        function login(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            
            db.ref('users/' + user.id + '/status').set('online');
            db.ref('users/' + user.id).onDisconnect().update({ status: 'offline' });
            loadUsers(user.id);
        }

        function loadUsers(myId) {
            db.ref('users').on('value', (snap) => {
                const users = snap.val();
                let html = '<div style="padding:15px;"><div style="background:var(--search); padding:10px; border-radius:20px; color:var(--grey);">Search chats</div></div>';
                for(let key in users) {
                    const u = users[key];
                    const isOnline = u.status === 'online';
                    html += `
                        <div class="user-row">
                            <div style="width:50px; height:50px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px;">👤</div>
                            <div style="flex:1;">
                                <b>${u.name} ${u.id === myId ? '(You)' : ''}</b>
                                <p style="font-size:12px; color:var(--grey); display:flex; align-items:center; gap:5px; margin-top:2px;">
                                    <span class="dot ${isOnline ? 'online' : ''}"></span> ${u.id}
                                </p>
                            </div>
                        </div>`;
                }
                document.getElementById('user-list').innerHTML = html;
            });
        }
    </script>
</body>
</html>
