<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaano Zara - Video Downloader</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e3e; /* Red color for downloader */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        .header h1 { font-size: 32px; color: var(--primary); margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 14px; }

        .container { width: 100%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }

        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px 15px 15px 45px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 62, 62, 0.2); }
        .input-group .material-icons { position: absolute; left: 15px; top: 15px; color: #64748b; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }

        /* Result Section */
        #result-box { margin-top: 25px; display: none; text-align: center; border-top: 1px solid #334155; padding-top: 20px; }
        .preview-img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #475569; }
        .download-final { background: #22c55e; margin-top: 10px; }

        /* Loader */
        .loader { display: none; margin: 20px auto; border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer { margin-top: auto; padding: 20px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span style="color:white">Jaano</span> Zara</h1>
        <p>Instagram & YouTube Video Downloader</p>
    </div>

    <div class="container">
        <div class="input-group">
            <span class="material-icons">link</span>
            <input type="text" id="video-url" placeholder="Paste video link here...">
        </div>

        <button class="btn" onclick="fetchVideo()">
            <span class="material-icons">download</span> Get Video Info
        </button>

        <div class="loader" id="loader"></div>

        <div id="result-box">
            <p style="margin-bottom: 10px; font-weight: bold;">Video Ready!</p>
            <img src="" id="thumb" class="preview-img">
            <a id="download-link" href="#" target="_blank" style="text-decoration: none;">
                <button class="btn download-final">
                    <span class="material-icons">file_download</span> Download Now
                </button>
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 Jaano Zara | Made with ❤️ for Ahmedabad
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('video-url').value;
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');

            if (!url) return alert("Bhai, link toh daal de!");

            // Show Loader
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            // --- Yahan API ka Magic Shuru Hoga ---
            // Abhi ke liye hum sirf "Simulation" kar rahe hain
            setTimeout(() => {
                loader.style.display = 'none';
                resultBox.style.display = 'block';
                
                // Demo Data (Asli API aane par ye badal jayega)
                document.getElementById('thumb').src = "https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000&auto=format&fit=crop";
                document.getElementById('download-link').href = url; // Link wahi rakha hai testing ke liye
                
                alert("Bhai, Design mast hai na? Asli Download link tab chalega jab hum API connect karenge.");
            }, 2000);
        }
    </script>
</body>
</html>
